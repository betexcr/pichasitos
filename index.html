<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>PICHASITOS - Boxeo Arcade en las Fiestas de Santa Cruz</title>
  <meta name="description" content="Juego arcade de boxeo estilo SNES ambientado en las Fiestas Patronales de Santa Cruz, Guanacaste. Eche la teja, escoja su peleador y demuestre quien es el mas teja del redondel. Pura vida y pichazos!" />
  <meta name="theme-color" content="#0A0A2A" />

  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pichasitos.surge.sh/" />
  <meta property="og:title" content="PICHASITOS - Boxeo Arcade en las Fiestas de Santa Cruz" />
  <meta property="og:description" content="Juego arcade de boxeo estilo SNES ambientado en las Fiestas Patronales de Santa Cruz, Guanacaste. Eche la teja y demuestre quien manda en el redondel. Pura vida y pichazos!" />
  <meta property="og:image" content="https://pichasitos.surge.sh/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PICHASITOS - Boxeo Arcade en las Fiestas de Santa Cruz" />
  <meta name="twitter:description" content="Juego arcade de boxeo estilo SNES ambientado en las Fiestas Patronales de Santa Cruz, Guanacaste. Eche la teja y demuestre quien manda en el redondel. Pura vida y pichazos!" />
  <meta name="twitter:image" content="https://pichasitos.surge.sh/og-image.jpg" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="screen-wrap">
    <canvas id="glow"></canvas>
    <canvas id="game"></canvas>
  </div>

  <div id="touch-controls">
    <div id="touch-meta">
      <button class="touch-btn touch-meta-btn" data-action="coin">TEJA</button>
      <button class="touch-btn touch-meta-btn" data-action="start">START</button>
    </div>
    <div id="touch-gameplay">
      <div id="touch-dpad">
        <button class="touch-btn dpad-btn dpad-up" data-action="up"></button>
        <button class="touch-btn dpad-btn dpad-left" data-action="left"></button>
        <div class="dpad-center"></div>
        <button class="touch-btn dpad-btn dpad-right" data-action="right"></button>
        <button class="touch-btn dpad-btn dpad-down" data-action="down"></button>
      </div>
      <div id="touch-actions">
        <button class="touch-btn action-btn action-a" data-action="punchLeft">A</button>
        <button class="touch-btn action-btn action-s" data-action="punchRight">S</button>
        <button class="touch-btn action-btn action-d" data-action="special">D</button>
      </div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/arcade.js"></script>
  <script src="js/player.js"></script>
  <script src="js/opponents.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/online-scoreboard.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
