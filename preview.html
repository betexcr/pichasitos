<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PICHASITOS — Fighter Preview</title>
<style>
:root {
  --bg: #0a0a1a;
  --card: #12122a;
  --border: #2a2a4a;
  --gold: #ffd700;
  --text: #e8e8f0;
  --muted: #8888aa;
  --accent: #39ff14;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 32px 16px 24px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #14142e 0%, var(--bg) 100%);
}
header h1 {
  font-size: 2.4rem;
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
}
header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

.announcement-wrap {
  position: relative;
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 16px 0;
}
.announcement-wrap[hidden] { display: none !important; }
.announcement-inner {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  background: linear-gradient(180deg, #14142e 0%, #0a0a1a 100%);
}
.announce-brand {
  text-align: center;
  padding: 14px 40px 10px 14px;
  border-bottom: 1px solid var(--border);
}
.announce-logo {
  display: block;
  font-size: clamp(1.1rem, 3vw, 1.45rem);
  letter-spacing: 0.35em;
  color: var(--gold);
  font-weight: 800;
}
.announce-sub {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.18em;
}
.announce-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  align-items: start;
}
@media (max-width: 900px) {
  .announce-columns { grid-template-columns: 1fr; }
}
.announce-col {
  padding: 14px 16px 18px;
}
.announce-col-sprites {
  border-right: 1px solid var(--border);
}
@media (max-width: 900px) {
  .announce-col-sprites {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
}
.announce-heading {
  font-size: 0.78rem;
  letter-spacing: 0.28em;
  margin: 0 0 12px;
  text-align: center;
  font-weight: 700;
}
.announce-heading.sprites {
  color: var(--accent);
  text-shadow: 0 0 14px rgba(57,255,20,0.25);
}
.announce-heading.circuits { color: var(--gold); }
.announce-idle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
  gap: 8px;
}
.announce-idle-cell {
  text-align: center;
  min-width: 0;
}
.announce-idle-img {
  width: 100%;
  max-width: 88px;
  height: auto;
  margin: 0 auto;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: linear-gradient(135deg, #1a1a35 0%, #0e0e20 100%);
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
}
.announce-idle-name {
  display: block;
  font-size: 0.58rem;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.announce-circuits-visual img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.06);
}
.announce-dismiss {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(10,10,26,0.75);
  color: var(--text);
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
  transition: background 0.15s, border-color 0.15s;
}
.announce-dismiss:hover {
  background: rgba(255,215,0,0.2);
  border-color: var(--gold);
  color: var(--gold);
}

.roster {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  padding: 20px 16px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.roster button {
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.15s;
}
.roster button:hover { border-color: var(--gold); color: var(--gold); }
.roster button.active {
  background: rgba(255,215,0,0.15);
  border-color: var(--gold);
  color: var(--gold);
}

.fighter-view {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

.fighter-header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 28px;
}
.fighter-header .ref-img {
  width: 140px;
  height: 140px;
  border-radius: 12px;
  border: 2px solid var(--border);
  object-fit: contain;
  background: var(--card);
  flex-shrink: 0;
}
.fighter-info h2 {
  font-size: 1.8rem;
  color: var(--gold);
  margin-bottom: 4px;
}
.fighter-info .title { color: var(--muted); font-size: 1rem; }

.section-label {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.pose-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 36px;
}
.pose-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.pose-card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(255,215,0,0.1);
}
.pose-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(57,255,20,0.15);
}
.pose-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: contain;
  background: linear-gradient(135deg, #1a1a35 0%, #0e0e20 100%);
  display: block;
}
.pose-card .label {
  padding: 8px 10px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  text-align: center;
}
.pose-card.active .label { color: var(--accent); }

.anim-stage {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 32px;
}
.anim-stage h3 {
  color: var(--gold);
  margin-bottom: 16px;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-align: center;
}

.player-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.sprite-viewport {
  width: 280px;
  height: 280px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  background: linear-gradient(135deg, #1a1a35 0%, #0e0e20 100%);
  border: 2px solid var(--border);
}
.sprite-viewport img {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  transition: opacity 0.12s ease, transform 0.15s ease;
}
.sprite-viewport img.behind { opacity: 0; z-index: 0; }
.sprite-viewport img.front  { opacity: 1; z-index: 1; }

.sprite-viewport.shake {
  animation: shake 0.15s ease-in-out;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px) rotate(-1deg); }
  40% { transform: translateX(5px) rotate(1deg); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(3px); }
}
.sprite-viewport.impact {
  animation: impact 0.2s ease-out;
}
@keyframes impact {
  0% { transform: scale(1); }
  30% { transform: scale(1.06); }
  100% { transform: scale(1); }
}

.pose-desc {
  color: var(--muted);
  font-size: 0.85rem;
  font-style: italic;
  min-height: 1.2em;
  text-align: center;
}

.player-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.player-controls button {
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.15s;
}
.player-controls button:hover { border-color: var(--gold); color: var(--gold); }
.player-controls button.active {
  background: rgba(57,255,20,0.12);
  border-color: var(--accent);
  color: var(--accent);
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  color: var(--muted);
  font-size: 0.8rem;
}
.speed-control input { width: 120px; accent-color: var(--gold); }

.arena-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}
.arena-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
  cursor: pointer;
}
.arena-card:hover { border-color: var(--gold); }
.arena-card canvas {
  width: 100%;
  display: block;
  image-rendering: pixelated;
}
.arena-card .arena-label {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.arena-card .arena-label .name {
  font-weight: 700;
  font-size: 0.95rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.arena-card .arena-label .circuit-dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  margin-right: 8px; vertical-align: middle;
}
.arena-card .arena-label .opponents {
  color: var(--muted);
  font-size: 0.78rem;
}

.portrait-pair {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.portrait-slot {
  text-align: center;
}
.portrait-slot .ref-img {
  width: 110px;
  height: 110px;
}
.portrait-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-top: 4px;
}
.sig-names {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.sig-tag {
  background: rgba(255,60,40,0.15);
  border: 1px solid rgba(255,60,40,0.35);
  color: #ff6b4a;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 1px;
}
.pose-card.sig-card {
  border-color: rgba(255,60,40,0.3);
}
.pose-card.sig-card:hover {
  border-color: #ff6b4a;
  box-shadow: 0 4px 20px rgba(255,60,40,0.15);
}
.pose-card .sig-label {
  color: #ff6b4a;
  font-size: 0.7rem;
}

.arena-game-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(5px);
}
.arena-game-modal.is-open {
  display: flex;
}
.arena-game-modal-panel {
  position: relative;
  max-width: calc(100vw - 24px);
  background: var(--card);
  border: 2px solid var(--gold);
  border-radius: 12px;
  padding: 40px 16px 14px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.55);
}
.arena-game-modal-panel h3 {
  color: var(--gold);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-align: center;
  text-transform: uppercase;
  margin: 0 0 10px;
  padding: 0 28px;
  line-height: 1.35;
}
.arena-game-modal-loading {
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
  padding: 80px 24px;
  min-width: 200px;
}
.arena-game-canvas-wrap {
  line-height: 0;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: #000;
}
.arena-game-canvas-wrap canvas {
  display: block;
  width: min(768px, calc(100vw - 64px));
  height: auto;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
.arena-game-modal-close {
  position: absolute;
  top: 8px;
  right: 10px;
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  font-size: 1.4rem;
  line-height: 1;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.arena-game-modal-close:hover {
  background: rgba(255,215,0,0.2);
  color: var(--gold);
}
.arena-game-modal-hint {
  margin-top: 10px;
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.5px;
}
</style>
<script src="js/constants.js"></script>
<script src="js/asset-loader.js"></script>
<script src="js/sprites.js"></script>
<script src="js/renderer.js"></script>
</head>
<body>

<header>
  <h1>Pichasitos</h1>
  <p>Fighter Roster &amp; Animation Preview</p>
</header>

<div class="announcement-wrap" id="announcement-banner" role="region" aria-label="Update announcement">
  <div class="announcement-inner">
    <button type="button" class="announce-dismiss" id="announcement-dismiss" aria-label="Dismiss announcement">&times;</button>
    <img src="assets/promo/pichasitos-announcement-banner.png" alt="PICHASITOS — New sprites and new circuits" width="1200" height="400" loading="lazy" decoding="async" />
  </div>
</div>

<section class="arena-section" id="arena-section">
  <div class="section-label" style="max-width:1100px;margin:0 auto;padding:20px 16px 0;">Arena Backgrounds (4 Circuits) — click a card for the in-game view</div>
  <div class="arena-grid" id="arena-grid"></div>
</section>

<nav class="roster" id="roster"></nav>
<main class="fighter-view" id="fighter-view"></main>

<div id="arena-game-modal" class="arena-game-modal" aria-hidden="true">
  <div class="arena-game-modal-panel">
    <button type="button" class="arena-game-modal-close" id="arena-game-modal-close" aria-label="Close">&times;</button>
    <h3 id="arena-game-modal-title">Arena</h3>
    <div id="arena-game-modal-loading" class="arena-game-modal-loading">Loading arena assets…</div>
    <div id="arena-game-canvas-wrap" class="arena-game-canvas-wrap" style="display:none">
      <canvas id="arena-game-canvas"></canvas>
    </div>
    <p class="arena-game-modal-hint">In-game <code style="color:#aaa">Renderer.drawArena</code> at native resolution (×3 scale)</p>
  </div>
</div>

function posePath(slug, pose, version) {
  const v = version || 'v2';
  const m = pose.match(/^(.+)_(f\d+)$/);
  if (m) return `assets/poses/${slug}/enemy_${slug}_${m[1]}_${v}_${m[2]}.png?v=${ASSET_VERSION}`;
  return `assets/poses/${slug}/enemy_${slug}_${pose}_${v}.png?v=${ASSET_VERSION}`;
}
function enemyPath(slug, version) {
  const v = version || 'v2';
  return `assets/enemies/enemy_${slug}_idle_${v}.png?v=${ASSET_VERSION}`;
}
function portraitPath(slug) {
  return `assets/portraits/portrait_${slug}_intro_v1.png?v=${ASSET_VERSION}`;
}
function portraitFallback(slug) {
  return `assets/portraits/portrait_${slug}_angry_v1.png?v=${ASSET_VERSION}`;
}
function imgFallbackV1(img, slug, pose) {
  if (!img.dataset.triedV1) {
    img.dataset.triedV1 = '1';
    if (pose) img.src = posePath(slug, pose, 'v1');
    else img.src = enemyPath(slug, 'v1');
  } else {
    img.style.display = 'none';
  }
}

let currentSlug = null;
let animTimer = null;
let animFrame = 0;
let speedMul = 1.0;
let spriteA = null;
let spriteB = null;
let viewport = null;
let activeFront = 'A';

function buildRoster() {
  const nav = document.getElementById('roster');
  FIGHTERS.forEach(f => {
    const btn = document.createElement('button');
    btn.textContent = f.name;
    btn.dataset.slug = f.slug;
    btn.addEventListener('click', () => selectFighter(f.slug));
    nav.appendChild(btn);
  });
}

function selectFighter(slug) {
  currentSlug = slug;
  document.querySelectorAll('.roster button').forEach(b =>
    b.classList.toggle('active', b.dataset.slug === slug)
  );
  renderFighter(slug);
}

function showPose(slug, pose) {
  const src = posePath(slug, pose);
  const motion = POSE_MOTION[pose] || { x: 0, y: 0, s: 1 };
  const transform = `translate(${motion.x}px, ${motion.y}px) scale(${motion.s})`;

  if (activeFront === 'A') {
    spriteB.dataset.triedV1 = '';
    spriteB.onerror = function() { imgFallbackV1(this, slug, pose); };
    spriteB.src = src;
    spriteB.style.transform = transform;
    spriteB.classList.replace('behind', 'front');
    spriteA.classList.replace('front', 'behind');
    activeFront = 'B';
  } else {
    spriteA.dataset.triedV1 = '';
    spriteA.onerror = function() { imgFallbackV1(this, slug, pose); };
    spriteA.src = src;
    spriteA.style.transform = transform;
    spriteA.classList.replace('behind', 'front');
    spriteB.classList.replace('front', 'behind');
    activeFront = 'A';
  }

  const fx = POSE_FX[pose];
  if (fx && viewport) {
    viewport.classList.remove('shake', 'impact');
    void viewport.offsetWidth;
    viewport.classList.add(fx);
  }

  document.querySelectorAll('.pose-card').forEach(c =>
    c.classList.toggle('active', c.dataset.pose === pose)
  );
}

function renderFighter(slug) {
  const f = FIGHTERS.find(x => x.slug === slug);
  if (!f) return;
  stopAnim();

  const hasPortrait = slug !== 'player';
  const view = document.getElementById('fighter-view');
  const sigsHtml = f.sigs.length ? `<div class="sig-names">${f.sigs.map(s => `<span class="sig-tag">${s.name}</span>`).join('')}</div>` : '';
  view.innerHTML = `
    <div class="fighter-header">
      ${hasPortrait ? `<div class="portrait-pair">
        <div class="portrait-slot"><img class="ref-img" src="${portraitPath(slug)}" alt="Intro" onerror="this.src='${posePath(slug,'idle')}'; this.onerror=function(){this.style.display='none'}"><div class="portrait-label">INTRO</div></div>
        <div class="portrait-slot"><img class="ref-img" src="${portraitFallback(slug)}" alt="Angry" onerror="this.style.display='none'"><div class="portrait-label">ANGRY</div></div>
      </div>` : ''}
      <img class="ref-img" src="${enemyPath(slug)}" alt="${f.name} sprite" onerror="imgFallbackV1(this,'${slug}')">
      <div class="fighter-info">
        <h2>${f.name}</h2>
        <div class="title">${f.title}</div>
        ${sigsHtml}
      </div>
    </div>

    <div class="anim-stage">
      <h3>Animation Player</h3>
      <div class="player-wrap">
        <div class="sprite-viewport" id="viewport">
          <img id="spriteA" class="front" src="${posePath(slug, f.poses[0])}" alt="sprite" onerror="imgFallbackV1(this,'${slug}','${f.poses[0]}')">
          <img id="spriteB" class="behind" src="${posePath(slug, f.poses[0])}" alt="sprite" onerror="imgFallbackV1(this,'${slug}','${f.poses[0]}')">
        </div>
        <div class="pose-desc" id="pose-desc"></div>
        <div class="player-controls" id="player-controls"></div>
        <div class="speed-control">
          <span>Speed</span>
          <input type="range" id="speed-slider" min="0.3" max="2.5" value="1" step="0.1">
          <span id="speed-label">1.0x</span>
        </div>
      </div>
    </div>

    <div class="section-label">All Poses (${f.poses.length}${f.sigs.length ? ' + ' + f.sigs.length + ' signatures' : ''})</div>
    <div class="pose-grid" id="pose-grid"></div>
  `;

  spriteA = document.getElementById('spriteA');
  spriteB = document.getElementById('spriteB');
  viewport = document.getElementById('viewport');
  activeFront = 'A';

  const grid = document.getElementById('pose-grid');
  const sigsByPose = {};
  f.sigs.forEach(sig => { (sigsByPose[sig.pose] = sigsByPose[sig.pose] || []).push(sig); });
  f.poses.forEach(pose => {
    const matchedSigs = sigsByPose[pose];
    if (matchedSigs) {
      matchedSigs.forEach(sig => {
        const card = document.createElement('div');
        card.className = 'pose-card sig-card';
        card.dataset.pose = sig.pose;
        card.innerHTML = `
          <img src="${posePath(slug, sig.pose)}" alt="${sig.name}" onerror="imgFallbackV1(this,'${slug}','${sig.pose}')">
          <div class="label sig-label">${sig.name}</div>
        `;
        card.addEventListener('click', () => {
          stopAnim();
          showPose(slug, sig.pose);
          document.getElementById('pose-desc').textContent = sig.name;
          document.querySelectorAll('.player-controls button').forEach(b => b.classList.remove('active'));
        });
        grid.appendChild(card);
      });
    } else {
      const card = document.createElement('div');
      card.className = 'pose-card';
      card.dataset.pose = pose;
      card.innerHTML = `
        <img src="${posePath(slug, pose)}" alt="${pose}" onerror="imgFallbackV1(this,'${slug}','${pose}')">
        <div class="label">${POSE_LABELS[pose] || pose}</div>
      `;
      card.addEventListener('click', () => {
        stopAnim();
        showPose(slug, pose);
        document.getElementById('pose-desc').textContent = POSE_LABELS[pose] || pose;
        document.querySelectorAll('.player-controls button').forEach(b => b.classList.remove('active'));
      });
      grid.appendChild(card);
    }
  });

  const sequences = getAnimSequences(f);
  const controls = document.getElementById('player-controls');
  sequences.forEach(seq => {
    const btn = document.createElement('button');
    btn.textContent = seq.name;
    btn.addEventListener('click', () => playAnim(slug, seq, btn));
    controls.appendChild(btn);
  });

  const slider = document.getElementById('speed-slider');
  const label = document.getElementById('speed-label');
  slider.addEventListener('input', () => {
    speedMul = parseFloat(slider.value);
    label.textContent = speedMul.toFixed(1) + 'x';
  });
}

function playAnim(slug, seq, btn) {
  stopAnim();
  document.querySelectorAll('.player-controls button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  animFrame = 0;
  const desc = document.getElementById('pose-desc');

  function tick() {
    const frame = seq.frames[animFrame];
    showPose(slug, frame.pose);
    desc.textContent = `${seq.name} — ${POSE_LABELS[frame.pose] || frame.pose}`;

    animFrame = (animFrame + 1) % seq.frames.length;
    animTimer = setTimeout(tick, frame.ms / speedMul);
  }
  tick();
}

function stopAnim() {
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
}

const MONSTER_TYPES = [
  'cadejos', 'segua', 'llorona', 'carreta', 'padre_sin_cabeza',
  'tulevieja', 'mico_malo', 'bruja_zarate',
];
const MONSTER_ASSET_KEYS = {
  cadejos: 'monster_cadejos', segua: 'monster_segua',
  llorona: 'monster_llorona', carreta: 'monster_carreta',
  padre_sin_cabeza: 'monster_padre',
  tulevieja: 'monster_tulevieja', mico_malo: 'monster_mico_malo',
  bruja_zarate: 'monster_bruja_zarate',
};
const MONSTER_DRAW_H = 22;
const monsterImages = {};

function loadMonsterImages() {
  for (const key of Object.values(MONSTER_ASSET_KEYS)) {
    const img = new Image();
    img.src = `assets/monsters/${key}.png?v=${ASSET_VERSION}`;
    img.onload = () => { monsterImages[key] = img; };
  }
}

function spawnMonster(W, activeMonsters) {
  const active = new Set(activeMonsters.map(m => m.type));
  const available = MONSTER_TYPES.filter(t => !active.has(t));
  if (available.length === 0) return null;
  const type = available[Math.floor(Math.random() * available.length)];
  const goRight = Math.random() < 0.5;
  return {
    type, x: goRight ? -20 : W + 20, y: 58 + Math.random() * 28,
    vx: (goRight ? 1 : -1) * (0.15 + Math.random() * 0.25),
    phase: Math.random() * Math.PI * 2, alpha: 0,
    maxAlpha: 0.85 + Math.random() * 0.15, alive: true,
  };
}

function drawMuerteMonsters(c, tick, st) {
  const W = GAME_W;
  st.monsterTimer--;
  if (st.monsterTimer <= 0 && st.monsters.length < 3) {
    const spawned = spawnMonster(W, st.monsters);
    if (spawned) st.monsters.push(spawned);
    st.monsterTimer = 200 + Math.floor(Math.random() * 400);
  }
  for (const m of st.monsters) {
    m.x += m.vx;
    const inside = m.x > -5 && m.x < W + 5;
    m.alpha += (inside ? m.maxAlpha - m.alpha : -m.alpha) * 0.04;
    if ((m.vx > 0 && m.x > W + 25) || (m.vx < 0 && m.x < -25)) m.alive = false;
  }
  st.monsters = st.monsters.filter(m => m.alive);

  for (const m of st.monsters) {
    if (m.alpha < 0.01) continue;
    const assetKey = MONSTER_ASSET_KEYS[m.type];
    const img = monsterImages[assetKey];
    if (!img) continue;
    const bob = Math.sin(tick * 0.05 + m.phase) * 1.5;
    const flip = m.vx < 0;
    const drawH = MONSTER_DRAW_H;
    const aspect = img.width / img.height;
    const drawW = drawH * aspect;
    const dx = Math.floor(m.x - drawW / 2);
    const dy = Math.floor(m.y - drawH / 2 + bob);

    c.globalAlpha = m.alpha;
    c.save();
    if (flip) {
      c.translate(dx + drawW, dy);
      c.scale(-1, 1);
      c.drawImage(img, 0, 0, drawW, drawH);
    } else {
      c.drawImage(img, dx, dy, drawW, drawH);
    }
    c.restore();
  }
  c.globalAlpha = 1;
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawSarchiRosette(c, x, y, size) {
  const colors = ['#FF2222','#3388FF','#FFD700','#33CC33','#FF8800'];
  const s = Math.max(2, Math.floor(size));
  const ps = Math.max(1, Math.floor(s / 4));
  c.fillStyle = '#5C3A22';
  c.beginPath(); c.arc(x, y, s + 1, 0, Math.PI * 2); c.fill();
  const petals = 8;
  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * Math.PI * 2;
    const pSize = i % 2 === 0 ? ps * 2 : Math.max(1, Math.floor(ps * 1.4));
    const dist = i % 2 === 0 ? s : s * 0.85;
    const px = x + Math.round(Math.cos(angle) * dist);
    const py = y + Math.round(Math.sin(angle) * dist);
    c.fillStyle = colors[i % colors.length];
    c.fillRect(px - Math.floor(pSize/2), py - Math.floor(pSize/2), pSize, pSize);
    c.fillStyle = 'rgba(255,255,255,0.2)';
    c.fillRect(px - Math.floor(pSize/2), py - Math.floor(pSize/2), pSize, 1);
  }
  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * Math.PI * 2 + Math.PI / petals;
    const px = x + Math.round(Math.cos(angle) * s * 0.55);
    const py = y + Math.round(Math.sin(angle) * s * 0.55);
    c.fillStyle = colors[(i + 2) % colors.length];
    c.fillRect(px - 1, py - 1, ps + 1, ps + 1);
  }
  c.fillStyle = '#FFD700';
  const cps = Math.max(2, ps * 2);
  c.fillRect(x - Math.floor(cps/2), y - Math.floor(cps/2), cps, cps);
  c.fillStyle = 'rgba(255,255,255,0.35)';
  c.fillRect(x - Math.floor(cps/2), y - Math.floor(cps/2), cps, 1);
}

function drawTorch(c, x, y, tick) {
  c.fillStyle = '#5C3A22';
  c.fillRect(x, y + 4, 2, 6);
  const flicker = Math.sin(tick * 0.3) * 0.5 + Math.sin(tick * 0.47) * 0.3;
  const h = 3 + Math.floor(flicker + 1);
  c.fillStyle = '#FF8C00';
  c.fillRect(x - 1, y + 3 - h, 4, h);
  c.fillStyle = '#FFCC00';
  c.fillRect(x, y + 2 - h, 2, Math.max(1, h - 1));
  c.fillStyle = '#FFF8E0';
  c.fillRect(x, y + 1 - h, 1, 1);
  c.fillStyle = `rgba(255,140,0,${0.08 + flicker * 0.03})`;
  c.fillRect(x - 5, y - h - 2, 12, h + 8);
}

function drawArenaPreview(canvas, idx, tick) {
  const c = canvas.getContext('2d');
  const W = GAME_W, H = GAME_H;
  const theme = ARENA_THEMES[idx];
  const circuit = CIRCUITS[idx];
  const st = arenaAnimState[idx];

  c.clearRect(0, 0, W, H);

  const bgImg = arenaBgImages[circuit.bg];
  if (bgImg) {
    const arenaH = 100;
    const aspect = bgImg.width / bgImg.height;
    const drawW = W;
    const drawH = drawW / aspect;
    c.drawImage(bgImg, 0, 0, bgImg.width, bgImg.height, 0, arenaH - drawH, drawW, drawH);
    if (theme.key === 'feria') { c.fillStyle='rgba(40,0,60,0.18)'; c.fillRect(0,0,W,100); }
    else if (theme.key === 'muerte') { c.fillStyle='rgba(70,0,0,0.22)'; c.fillRect(0,0,W,100); }
  } else {
    const grad = c.createLinearGradient(0, 0, 0, 100);
    const stops = theme.skyStops;
    const last = Math.max(1, stops.length - 1);
    for (let i = 0; i < stops.length; i++) grad.addColorStop(i / last, stops[i]);
    c.fillStyle = grad;
    c.fillRect(0, 0, W, 100);
  }

  if (theme.hasStars) {
    for (const s of st.stars) {
      const twinkle = 0.3 + Math.sin(tick * 0.04 + s.phase) * 0.3;
      c.fillStyle = `rgba(255,255,255,${twinkle})`;
      c.fillRect(s.x, s.y, 1, 1);
    }
  }

  if (theme.hasMoon) {
    const mx=38, my=18, mr=10;
    c.fillStyle='rgba(180,200,255,0.03)'; c.beginPath(); c.arc(mx,my,mr+14,0,Math.PI*2); c.fill();
    c.fillStyle='#FFFDE8'; c.beginPath(); c.arc(mx,my,mr,0,Math.PI*2); c.fill();
    c.fillStyle='#FFFFF4'; c.beginPath(); c.arc(mx-2,my-2,mr-3,0,Math.PI*2); c.fill();
    c.fillStyle='#DDD8B0'; c.fillRect(mx-3,my-2,3,2); c.fillRect(mx+2,my+3,2,2);
  }

  if (theme.key === 'feria') {
    const wheelX=W-38, wheelY=48, spokes=10, spin=tick*0.01;
    c.strokeStyle='rgba(220,230,255,0.5)'; c.lineWidth=1;
    c.beginPath(); c.arc(wheelX,wheelY,20,0,Math.PI*2); c.stroke();
    for(let i=0;i<spokes;i++){
      const a=spin+(i/spokes)*Math.PI*2;
      c.strokeStyle='rgba(190,210,255,0.35)'; c.beginPath(); c.moveTo(wheelX,wheelY); c.lineTo(wheelX+Math.cos(a)*20,wheelY+Math.sin(a)*20); c.stroke();
      const on=Math.sin(tick*0.16+i)>0.2;
      c.fillStyle=on?'#FF5AD9':'#3B2A5C'; c.fillRect(Math.floor(wheelX+Math.cos(a)*20)-1,Math.floor(wheelY+Math.sin(a)*20)-1,3,3);
    }
  }

  if (theme.key === 'muerte') {
    for(let i=0;i<8;i++){
      const x=(i*37+tick*0.25)%(W+20)-10, y=24+(i%4)*10;
      const glow=Math.sin(tick*0.18+i*1.9)*0.5+0.5;
      c.fillStyle=`rgba(255,90,30,${0.12+glow*0.14})`; c.fillRect(Math.floor(x),Math.floor(y),2,2);
    }
    c.fillStyle='rgba(35,10,10,0.3)'; c.fillRect(0,65,W,20);
    drawMuerteMonsters(c, tick, st);
  }

  if (theme.hasClouds) {
    const px = Math.sin(tick*0.003)*4;
    for(const cl of st.clouds){
      const cx=((cl.x+tick*cl.speed+px)%(W+cl.w))-cl.w/2;
      const cf=Math.floor(cx);
      c.fillStyle=theme.key==='pueblo'?'rgba(60,95,130,0.25)':'rgba(25,25,70,0.25)';
      c.fillRect(cf+2,cl.y-3,cl.w-4,2);
      c.fillStyle=theme.key==='pueblo'?'rgba(78,120,160,0.32)':'rgba(30,30,80,0.38)';
      c.fillRect(cf,cl.y,cl.w,3); c.fillRect(cf+3,cl.y-2,cl.w-6,2); c.fillRect(cf+2,cl.y+3,cl.w-4,2);
    }
  }

  if (theme.hasStringLights) {
    c.strokeStyle='#333'; c.lineWidth=1; c.beginPath(); c.moveTo(0,60);
    for(let x=0;x<=W;x+=4) c.lineTo(x,58+Math.sin(x*0.04)*4);
    c.stroke();
    for(let i=0;i<22;i++){
      const bx=i*12+3, by=58+Math.sin(bx*0.04)*4;
      const glow=Math.sin(tick*0.08+i*0.7)>0.2;
      const col=BULB_COLORS[i%BULB_COLORS.length];
      if(glow){
        c.fillStyle=hexToRgba(col,0.18); c.fillRect(bx-3,by-2,7,7);
        c.fillStyle=hexToRgba(col,0.3); c.fillRect(bx-2,by-1,5,5);
      }
      c.fillStyle=glow?col:'#555'; c.fillRect(bx-1,by,3,3);
      if(glow){ c.fillStyle='rgba(255,255,255,0.6)'; c.fillRect(bx,by,1,1); }
    }
  }

  if (theme.hasBanners) {
    const bannerCols=['#FF2222','#3388FF','#FFD700','#33CC33','#FF8800','#FF69B4'];
    for(let i=0;i<9;i++){
      const bx=6+i*28, sway=Math.sin(tick*0.03+i*0.8)*1.5, by=64+sway, bw=20, bh=12;
      const col=bannerCols[i%bannerCols.length];
      c.fillStyle=col; c.fillRect(bx,by,bw,bh);
      c.fillRect(bx+2,by+bh,bw-4,2); c.fillRect(bx+4,by+bh+2,bw-8,2); c.fillRect(bx+6,by+bh+4,bw-12,1);
      c.fillStyle='rgba(255,255,255,0.3)'; c.fillRect(bx+3,by+2,2,2);
      c.fillStyle='rgba(255,255,255,0.15)'; c.fillRect(bx,by,bw,1);
      c.fillStyle='rgba(0,0,0,0.18)'; c.fillRect(bx,by+bh-1,bw,1);
    }
  }

  if (theme.hasCrowd) {
    for(const p of st.crowd){
      const bounce=Math.sin(tick*0.06+p.phase)*(p.row===0?2:1.2);
      const py=p.y+bounce, h=p.height;
      c.globalAlpha=p.row===1?0.65:1;
      c.fillStyle=p.color; c.fillRect(p.x-3,py,6,h);
      c.fillStyle='rgba(255,255,255,0.08)'; c.fillRect(p.x-3,py,6,1);
      c.fillStyle='rgba(0,0,0,0.18)'; c.fillRect(p.x-3,py+h-1,6,1);
      c.fillStyle=p.skin; c.fillRect(p.x-2,py-4,4,5);
      c.fillStyle='rgba(0,0,0,0.35)'; c.fillRect(p.x-1,py-2,1,1); c.fillRect(p.x+1,py-2,1,1);
      if(p.hat==='cap'){
        c.fillStyle=p.hatColor; c.fillRect(p.x-3,py-5,6,2); c.fillRect(p.x-4,py-4,2,1);
      } else if(p.hat==='sombrero'){
        c.fillStyle=p.hatColor; c.fillRect(p.x-4,py-5,8,2); c.fillRect(p.x-2,py-7,4,2);
      }
      if(p.waving){
        const armY=py-2+Math.sin(tick*0.12+p.phase)*3;
        c.fillStyle=p.skin; c.fillRect(p.x+3,armY,2,2); c.fillRect(p.x+4,armY-1,1,1);
      }
      if(p.holdingBeer){
        c.fillStyle='#FFD700'; c.fillRect(p.x-4,py+1,2,3);
        c.fillStyle='#FFFDD0'; c.fillRect(p.x-4,py,2,1);
      }
    }
    c.globalAlpha=1;
  }

  // Fence
  const fenceY=95;
  if(theme.fenceStyle==='pueblo'){
    c.fillStyle='#8E5F3A'; c.fillRect(0,fenceY,W,45);
    c.fillStyle='#6E4528'; c.fillRect(0,fenceY,W,2); c.fillRect(0,fenceY+43,W,2);
    for(let x=0;x<=W;x+=22){ c.fillStyle='#5C3A22'; c.fillRect(x,fenceY,3,45); c.fillStyle='rgba(255,220,170,0.16)'; c.fillRect(x+1,fenceY,1,45); }
  } else if(theme.fenceStyle==='feria'){
    c.fillStyle='#4B355D'; c.fillRect(0,fenceY,W,45);
    for(let x=0;x<W;x+=16){ c.fillStyle=(Math.floor(x/16)%2===0)?'#FF4DC4':'#3FE1FF'; c.fillRect(x,fenceY+6,16,4); }
    for(let x=0;x<W;x+=12){ const by2=fenceY+2+Math.sin((x+tick)*0.05)*1.2; const on=Math.sin(tick*0.1+x*0.08)>0; c.fillStyle=on?'#FFE66B':'#2F2942'; c.fillRect(x,by2,3,3); }
    c.fillStyle='#2A2038'; c.fillRect(0,fenceY,W,2); c.fillRect(0,fenceY+43,W,2);
  } else if(theme.fenceStyle==='muerte'){
    c.fillStyle='#2A1612'; c.fillRect(0,fenceY,W,45);
    c.fillStyle='#140B09'; c.fillRect(0,fenceY,W,2); c.fillRect(0,fenceY+43,W,2);
    for(let x=0;x<=W;x+=14){ c.fillStyle='#1E0F0C'; c.fillRect(x,fenceY+8,2,37); c.fillStyle='#5A2016'; c.fillRect(x-1,fenceY+5,4,3); }
    c.strokeStyle='rgba(110,110,110,0.25)'; c.lineWidth=1;
    for(let y=fenceY+14;y<=fenceY+32;y+=8){ c.beginPath(); c.moveTo(0,y); c.lineTo(W,y+3); c.stroke(); }
  } else {
    // Redondel: Sarchi-themed fence with rosettes, colored panels, and torches
    const FENCE_WOOD='#9E7B5A', DARK_BROWN='#5C3A22', GOLD='#FFD700';
    const sarchiColors=['#FF2222','#3388FF','#FFD700','#33CC33','#FF8800'];
    c.fillStyle=FENCE_WOOD; c.fillRect(0,fenceY,W,45);
    // Wood grain
    c.fillStyle='rgba(0,0,0,0.05)';
    for(let gy=fenceY+3;gy<fenceY+43;gy+=3) c.fillRect(0,gy,W,1);
    c.fillStyle='rgba(255,220,160,0.06)';
    for(let gy=fenceY+5;gy<fenceY+43;gy+=5) c.fillRect(0,gy,W,1);
    // Top/bottom rails
    c.fillStyle='#7A5B3A'; c.fillRect(0,fenceY,W,2); c.fillRect(0,fenceY+43,W,2);
    c.fillStyle='rgba(255,220,160,0.22)'; c.fillRect(0,fenceY+2,W,1);
    c.fillStyle='rgba(0,0,0,0.1)'; c.fillRect(0,fenceY+44,W,1);
    // Panels with Sarchi ornaments
    const panelW=32;
    for(let i=0;i<=W;i+=panelW){
      // Post
      c.fillStyle=DARK_BROWN; c.fillRect(i,fenceY,3,45);
      c.fillStyle='rgba(255,220,160,0.18)'; c.fillRect(i+1,fenceY,1,45);
      c.fillStyle='rgba(0,0,0,0.12)'; c.fillRect(i+2,fenceY,1,45);
      const px=i+3, pw=Math.min(panelW-5,W-px);
      if(pw<=0) continue;
      const ci=Math.floor(i/panelW);
      // Colored stripes
      for(let s=0;s<3;s++){
        c.fillStyle=sarchiColors[(ci+s)%sarchiColors.length];
        c.fillRect(px,fenceY+4+s*14,pw,2);
        c.fillStyle=hexToRgba(sarchiColors[(ci+s+2)%sarchiColors.length],0.25);
        c.fillRect(px,fenceY+6+s*14,pw,1);
        c.fillStyle='rgba(255,255,255,0.1)';
        c.fillRect(px,fenceY+4+s*14,pw,1);
      }
      // Sarchi rosette on each panel
      if(pw>10) drawSarchiRosette(c,i+panelW/2,fenceY+22,6);
      // Torch on each post
      drawTorch(c,i+1,fenceY-8,tick+i*17);
      const flicker=Math.sin((tick+i*17)*0.3)*0.5+Math.sin((tick+i*17)*0.47)*0.3;
      const torchGlow=0.04+flicker*0.015;
      c.fillStyle=`rgba(255,140,0,${torchGlow})`; c.fillRect(i-4,fenceY,10,20);
      c.fillStyle=`rgba(255,180,60,${torchGlow*0.5})`; c.fillRect(i-8,fenceY,18,30);
    }
  }

  // Ground
  const dirtGrad=c.createLinearGradient(0,140,0,H);
  const gs=theme.groundStops, gLast=Math.max(1,gs.length-1);
  for(let i=0;i<gs.length;i++) dirtGrad.addColorStop(i/gLast,gs[i]);
  c.fillStyle=dirtGrad; c.fillRect(0,140,W,H-140);

  const centerGrad=c.createRadialGradient(W/2,190,10,W/2,190,80);
  centerGrad.addColorStop(0,theme.detailColor); centerGrad.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=centerGrad; c.fillRect(0,142,W,H-142);

  if(theme.centerRing){
    c.strokeStyle='rgba(120,80,50,0.2)'; c.lineWidth=1;
    c.beginPath(); c.ellipse(W/2,210,90,18,0,0,Math.PI*2); c.stroke();
  }

  c.fillStyle=theme.topLine; c.fillRect(0,140,W,1);
  c.fillStyle=theme.topLineHi; c.fillRect(0,141,W,1);
}

let arenaRaf = null;

let previewGameArenaRenderer = null;
let previewGameArenaRaf = null;
let previewGameArenaAssets = null;

function closeArenaGameView() {
  const modal = document.getElementById('arena-game-modal');
  if (!modal) return;
  modal.classList.remove('is-open');
  modal.setAttribute('aria-hidden', 'true');
  if (previewGameArenaRaf) {
    cancelAnimationFrame(previewGameArenaRaf);
    previewGameArenaRaf = null;
  }
}

function openArenaGameView(circuitIdx) {
  if (previewGameArenaRaf) {
    cancelAnimationFrame(previewGameArenaRaf);
    previewGameArenaRaf = null;
  }

  const modal = document.getElementById('arena-game-modal');
  const title = document.getElementById('arena-game-modal-title');
  const loading = document.getElementById('arena-game-modal-loading');
  const wrap = document.getElementById('arena-game-canvas-wrap');
  const cvs = document.getElementById('arena-game-canvas');
  if (!modal || !cvs || typeof Renderer === 'undefined' || typeof AssetLoader === 'undefined') return;

  const wanted = String(circuitIdx);
  modal.dataset.circuit = wanted;
  title.textContent = CIRCUITS[circuitIdx].name;
  modal.classList.add('is-open');
  modal.setAttribute('aria-hidden', 'false');
  loading.style.display = 'block';
  wrap.style.display = 'none';

  if (!previewGameArenaAssets) previewGameArenaAssets = new AssetLoader();
  previewGameArenaAssets.preload().then(() => {
    if (!modal.classList.contains('is-open')) return;
    if (modal.dataset.circuit !== wanted) return;

    loading.style.display = 'none';
    wrap.style.display = 'block';

    if (!previewGameArenaRenderer) {
      previewGameArenaRenderer = new Renderer(cvs, previewGameArenaAssets);
    }
    previewGameArenaRenderer.setCircuit(parseInt(modal.dataset.circuit, 10));

    let tick = 0;
    function loop() {
      if (!modal.classList.contains('is-open')) return;
      previewGameArenaRenderer.drawArena(tick++);
      previewGameArenaRaf = requestAnimationFrame(loop);
    }
    previewGameArenaRaf = requestAnimationFrame(loop);
  });
}

function initArenaSection() {
  const grid = document.getElementById('arena-grid');

  CIRCUITS.forEach((circ, idx) => {
    initArenaState(idx);
    const card = document.createElement('div');
    card.className = 'arena-card';
    card.title = 'Click for full in-game arena (Renderer.drawArena)';
    card.addEventListener('click', () => openArenaGameView(idx));
    const cvs = document.createElement('canvas');
    cvs.width = GAME_W;
    cvs.height = GAME_H;
    cvs.id = `arena-cvs-${idx}`;
    card.appendChild(cvs);

    const label = document.createElement('div');
    label.className = 'arena-label';
    label.innerHTML = `
      <span class="name"><span class="circuit-dot" style="background:${circ.color}"></span>${circ.name}</span>
      <span class="opponents">${circ.opponents.join(' · ')}</span>
    `;
    card.appendChild(label);
    grid.appendChild(card);
  });

  startArenaLoop();
}

function startArenaLoop() {
  if (arenaRaf) cancelAnimationFrame(arenaRaf);
  let tick = 0;
  function loop() {
    tick++;
    for (let i = 0; i < CIRCUITS.length; i++) {
      const cvs = document.getElementById(`arena-cvs-${i}`);
      if (cvs) drawArenaPreview(cvs, i, tick);
    }
    arenaRaf = requestAnimationFrame(loop);
  }
  loop();
}

loadArenaBgs();
loadMonsterImages();

// ─── Init ────────────────────────────────────────────────────

buildRoster();
initArenaSection();
selectFighter('player');

(function initArenaGameModalUi() {
  const modal = document.getElementById('arena-game-modal');
  const btn = document.getElementById('arena-game-modal-close');
  if (btn) btn.addEventListener('click', closeArenaGameView);
  if (modal) {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeArenaGameView();
    });
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal && modal.classList.contains('is-open')) closeArenaGameView();
  });
})();

(function initAnnouncementBanner() {
  const KEY = 'pichasitos-announce-dismissed';
  const wrap = document.getElementById('announcement-banner');
  const btn = document.getElementById('announcement-dismiss');
  if (!wrap || !btn) return;
  try {
    if (localStorage.getItem(KEY) === '1') wrap.hidden = true;
  } catch (_) { /* private mode */ }
  btn.addEventListener('click', () => {
    wrap.hidden = true;
    try { localStorage.setItem(KEY, '1'); } catch (_) {}
  });
})();
